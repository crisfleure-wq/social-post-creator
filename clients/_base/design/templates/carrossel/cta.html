<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<style>
{{TOKENS_CSS}}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: calc(var(--canvas-w) * 1px);
  height: calc(var(--canvas-h) * 1px);
  overflow: hidden;
  font-family: var(--font-body);
  background: var(--bg-canvas);
  color: var(--fg-default);
}

.slide {
  width: 100%;
  height: 100%;
  padding: var(--canvas-padding);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  position: relative;
}

.title {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 52px;
  line-height: 1.15;
  color: var(--brand-primary);
  margin-bottom: 32px;
}

.title .accent {
  color: var(--brand-accent);
}

.cta-button {
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 600;
  padding: 18px 40px;
  border-radius: var(--radius-pill);
  background: var(--brand-accent);
  color: var(--fg-on-accent);
  display: inline-block;
  margin-bottom: 24px;
}

.body-text {
  font-family: var(--font-body);
  font-size: 20px;
  line-height: 1.5;
  color: var(--fg-muted);
  max-width: 80%;
}

.footer {
  position: absolute;
  bottom: var(--canvas-padding);
  left: var(--canvas-padding);
  right: var(--canvas-padding);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.handle {
  font-family: var(--font-body);
  font-size: 18px;
  font-weight: 600;
  color: var(--brand-primary);
}

.page-label {
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--fg-muted);
}

.logo {
  position: absolute;
  top: var(--canvas-padding);
  right: var(--canvas-padding);
  height: 40px;
  width: auto;
}
</style>
</head>
<body>
<div class="slide">
  <h2 class="title" id="title"></h2>
  <div class="cta-button" id="cta"></div>
  <p class="body-text" id="body"></p>
  <div class="footer">
    <span class="handle">{{HANDLE}}</span>
    <span class="page-label">{{PAGE_LABEL}}</span>
  </div>
</div>
<script>
const slide = {{SLIDE_JSON}};

const titleEl = document.getElementById('title');
const ctaEl = document.getElementById('cta');
const bodyEl = document.getElementById('body');

if (slide.titleAccent && slide.title.includes(slide.titleAccent)) {
  const parts = slide.title.split(slide.titleAccent);
  titleEl.innerHTML = parts[0] + '<span class="accent">' + slide.titleAccent + '</span>' + (parts[1] || '');
} else {
  titleEl.textContent = slide.title;
}

if (slide.cta) {
  ctaEl.textContent = slide.cta;
} else {
  ctaEl.style.display = 'none';
}

if (slide.body) {
  bodyEl.textContent = slide.body;
} else {
  bodyEl.style.display = 'none';
}
</script>
</body>
</html>
