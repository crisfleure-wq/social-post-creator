<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<style>
{{TOKENS_CSS}}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1080px;
  height: 1440px;
  overflow: hidden;
  font-family: var(--font-body);
  background: var(--bg-inverse);
  color: var(--fg-inverse);
}

.slide {
  width: 100%;
  height: 100%;
  padding: var(--canvas-padding);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  position: relative;
  background: var(--bg-inverse);
}

/* Subtle vertical accent lines */
.slide::before,
.slide::after {
  content: '';
  position: absolute;
  width: 2px;
  top: 100px;
  bottom: 100px;
  background: rgba(244, 211, 94, 0.15);
}
.slide::before { left: 40px; }
.slide::after  { right: 40px; }

.title {
  font-family: var(--font-display);
  font-weight: 900;
  font-size: 56px;
  line-height: 1.1;
  color: var(--fg-inverse);
  margin-bottom: 40px;
  max-width: 850px;
}

.title .accent {
  color: var(--brand-accent);
}

.cta-button {
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 700;
  padding: 20px 48px;
  border-radius: var(--radius-pill);
  background: var(--brand-accent);
  color: var(--fg-on-accent);
  display: inline-block;
  margin-bottom: 32px;
  box-shadow: var(--shadow-yellow);
}

.body-text {
  font-family: var(--font-body);
  font-size: 20px;
  line-height: 1.5;
  color: rgba(255, 255, 255, 0.7);
  max-width: 720px;
}

/* Footer */
.footer {
  position: absolute;
  bottom: var(--canvas-padding);
  left: var(--canvas-padding);
  right: var(--canvas-padding);
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-top: 1px solid rgba(255, 255, 255, 0.15);
  padding-top: 16px;
}

.handle {
  font-family: var(--font-body);
  font-size: 16px;
  font-weight: 600;
  color: var(--brand-accent);
}

.page-label {
  font-family: var(--font-mono);
  font-size: 13px;
  color: rgba(255, 255, 255, 0.5);
}

.logo {
  height: 28px;
  width: auto;
}
</style>
</head>
<body>
<div class="slide">
  <h2 class="title" id="title"></h2>
  <div class="cta-button" id="cta"></div>
  <p class="body-text" id="body"></p>
  <div class="footer">
    <span class="handle">{{HANDLE}}</span>
    <img class="logo" src="{{LOGO_DATA_URI}}" alt="Blink" onerror="this.style.display='none'">
    <span class="page-label">{{PAGE_LABEL}}</span>
  </div>
</div>
<script>
const slide = {{SLIDE_JSON}};

const titleEl = document.getElementById('title');
const ctaEl   = document.getElementById('cta');
const bodyEl  = document.getElementById('body');

if (slide.titleAccent && slide.title.includes(slide.titleAccent)) {
  const parts = slide.title.split(slide.titleAccent);
  titleEl.innerHTML = parts[0] +
    '<span class="accent">' + slide.titleAccent + '</span>' +
    (parts[1] || '');
} else {
  titleEl.textContent = slide.title;
}

if (slide.cta) {
  ctaEl.textContent = slide.cta;
} else if (slide.badges && slide.badges.length > 0) {
  ctaEl.textContent = slide.badges[0].text;
} else {
  ctaEl.style.display = 'none';
}

if (slide.body) { bodyEl.textContent = slide.body; }
else { bodyEl.style.display = 'none'; }
</script>
</body>
</html>
