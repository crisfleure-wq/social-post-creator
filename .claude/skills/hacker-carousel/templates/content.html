<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Slide</title>
<style>
{{TOKENS_CSS}}

.canvas { gap: 0; }

.content-label { margin-bottom: 32px; }

.content-title {
  position: relative;
  z-index: 2;
  font-family: var(--font-display);
  font-weight: 700;
  line-height: 1.05;
  letter-spacing: -0.02em;
  white-space: pre-line;
  margin-bottom: 36px;
}

.content-title .accent { color: var(--accent-primary); }

.content-body {
  position: relative;
  z-index: 2;
  margin-bottom: 32px;
}

.content-terminal { margin-bottom: 32px; }
.content-steps { margin-bottom: 32px; }
.content-badges { margin-top: auto; margin-bottom: 24px; }
</style>
</head>
<body>
<div class="canvas">
  <span class="label content-label" id="label"></span>
  <h1 class="content-title" id="title"></h1>
  <p class="body content-body" id="body"></p>
  <div class="terminal content-terminal" id="terminal"></div>
  <ol class="steps content-steps" id="steps"></ol>
  <div class="badges content-badges" id="badges"></div>
  <div class="footer">
    <div class="brand">
      <img class="mascot" src="{{MASCOT_DATA_URI}}" alt="">
      <span class="handle">@brunobracaioli</span>
    </div>
    <span class="pagenum">{{PAGE_LABEL}}</span>
  </div>
</div>
<script>
const SLIDE = {{SLIDE_JSON}};

document.getElementById('label').textContent = SLIDE.label || '';

const titleEl = document.getElementById('title');
titleEl.style.fontSize = (SLIDE.titleSize || 88) + 'px';
const titleText = SLIDE.title || '';
const accent = SLIDE.titleAccent || '';
if (accent && titleText.includes(accent)) {
  const idx = titleText.indexOf(accent);
  titleEl.appendChild(document.createTextNode(titleText.slice(0, idx)));
  const span = document.createElement('span');
  span.className = 'accent';
  span.textContent = accent;
  titleEl.appendChild(span);
  titleEl.appendChild(document.createTextNode(titleText.slice(idx + accent.length)));
} else {
  titleEl.textContent = titleText;
}

const bodyEl = document.getElementById('body');
if (SLIDE.body) {
  bodyEl.style.fontSize = (SLIDE.bodySize || 38) + 'px';
  bodyEl.textContent = SLIDE.body;
} else {
  bodyEl.style.display = 'none';
}

const termEl = document.getElementById('terminal');
const lines = SLIDE.terminal || [];
if (lines.length > 0) {
  for (const l of lines) {
    const span = document.createElement('span');
    span.className = 'line ' + (l.type || 'command');
    span.textContent = l.text;
    termEl.appendChild(span);
  }
} else {
  termEl.style.display = 'none';
}

const stepsEl = document.getElementById('steps');
const steps = SLIDE.steps || [];
if (steps.length > 0) {
  stepsEl.style.fontSize = (SLIDE.bodySize || 36) + 'px';
  for (const s of steps) {
    const li = document.createElement('li');
    li.textContent = s;
    stepsEl.appendChild(li);
  }
} else {
  stepsEl.style.display = 'none';
}

const badgesEl = document.getElementById('badges');
const badges = SLIDE.badges || [];
const scale = SLIDE.badgeScale || 1;
for (const b of badges) {
  const el = document.createElement('span');
  el.className = 'badge ' + (b.color || 'primary');
  el.textContent = b.text;
  if (scale !== 1) {
    el.style.fontSize = (22 * scale) + 'px';
    el.style.padding = (10 * scale) + 'px ' + (18 * scale) + 'px';
  }
  badgesEl.appendChild(el);
}
if (badges.length === 0) badgesEl.style.display = 'none';
</script>
</body>
</html>
