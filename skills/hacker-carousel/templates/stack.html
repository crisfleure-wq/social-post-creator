<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Slide</title>
<style>
{{TOKENS_CSS}}

.canvas { gap: 0; }

.stack-label { margin-bottom: 32px; }

.stack-title {
  position: relative;
  z-index: 2;
  font-family: var(--font-display);
  font-weight: 700;
  line-height: 1.0;
  letter-spacing: -0.025em;
  white-space: pre-line;
  margin-bottom: 48px;
}

.stack-title .accent { color: var(--accent-primary); }

.stack-items { margin-bottom: 32px; }
.stack-terminal { margin-bottom: 32px; }
.stack-badges { margin-top: auto; margin-bottom: 24px; }
</style>
</head>
<body>
<div class="canvas">
  <span class="label stack-label" id="label"></span>
  <h1 class="stack-title" id="title"></h1>
  <ul class="items stack-items" id="items"></ul>
  <div class="terminal stack-terminal" id="terminal"></div>
  <div class="badges stack-badges" id="badges"></div>
  <div class="footer">
    <div class="brand">
      <img class="mascot" src="{{MASCOT_DATA_URI}}" alt="">
      <span class="handle">@brunobracaioli</span>
    </div>
    <span class="pagenum">{{PAGE_LABEL}}</span>
  </div>
</div>
<script>
const SLIDE = {{SLIDE_JSON}};

document.getElementById('label').textContent = SLIDE.label || '';

const titleEl = document.getElementById('title');
titleEl.style.fontSize = (SLIDE.titleSize || 112) + 'px';
const titleText = SLIDE.title || '';
const accent = SLIDE.titleAccent || '';
if (accent && titleText.includes(accent)) {
  const idx = titleText.indexOf(accent);
  titleEl.appendChild(document.createTextNode(titleText.slice(0, idx)));
  const span = document.createElement('span');
  span.className = 'accent';
  span.textContent = accent;
  titleEl.appendChild(span);
  titleEl.appendChild(document.createTextNode(titleText.slice(idx + accent.length)));
} else {
  titleEl.textContent = titleText;
}

const itemsEl = document.getElementById('items');
const items = SLIDE.items || [];
if (items.length > 0) {
  for (const it of items) {
    const li = document.createElement('li');
    const name = document.createElement('span');
    name.className = 'name';
    name.textContent = it.name;
    const desc = document.createElement('span');
    desc.className = 'desc';
    desc.textContent = it.description;
    li.appendChild(name);
    li.appendChild(desc);
    itemsEl.appendChild(li);
  }
} else {
  itemsEl.style.display = 'none';
}

const termEl = document.getElementById('terminal');
const lines = SLIDE.terminal || [];
if (lines.length > 0) {
  for (const l of lines) {
    const span = document.createElement('span');
    span.className = 'line ' + (l.type || 'arrow');
    span.textContent = l.text;
    termEl.appendChild(span);
  }
} else {
  termEl.style.display = 'none';
}

const badgesEl = document.getElementById('badges');
const badges = SLIDE.badges || [];
const scale = SLIDE.badgeScale || 1;
for (const b of badges) {
  const el = document.createElement('span');
  el.className = 'badge ' + (b.color || 'primary');
  el.textContent = b.text;
  if (scale !== 1) {
    el.style.fontSize = (22 * scale) + 'px';
    el.style.padding = (10 * scale) + 'px ' + (18 * scale) + 'px';
  }
  badgesEl.appendChild(el);
}
if (badges.length === 0) badgesEl.style.display = 'none';
</script>
</body>
</html>
